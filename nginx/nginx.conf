# Rate limiting zones — defined outside server block
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    #redirect http requests to https
    return 301 https://$host$request_uri;

        #Security headers
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "DENY"              always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com; frame-ancestors 'none';"
        always;

    #Frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    #auth endpoints with stricter rate limits
    location ~ ^/api/(auth|login|signup|token) {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    #General API proxy
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   
        proxy_send_timeout 120s;
    }

    #Health check passthrough 
    location /health {
        proxy_pass http://backend:8000/health;
    }
      # Docs explicitly blocked (belt + braces alongside FastAPI config)
    location ~* ^/(docs|redoc|openapi.json) {
        return 404;
    }
}
